name: Contracts Pipeline

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary

      - name: Run pipeline
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: python contracts_pipeline.py
